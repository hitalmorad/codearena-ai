# Isolated test profile: in-memory DB, no external judge, AI provider off so
# tests never hit the network and are fully deterministic.
spring.datasource.url=jdbc:h2:mem:codearena-test;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
codearena.judge.enabled=false
codearena.ai.provider=off
codearena.ai.groq.api-key=
