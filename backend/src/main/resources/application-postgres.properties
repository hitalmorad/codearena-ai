# PostgreSQL profile — activate with:  SPRING_PROFILES_ACTIVE=postgres
#
# This overrides only the datasource; everything else is inherited from
# application.properties. Connection details come from environment variables so
# no secrets are committed. You do NOT need Postgres installed locally to keep
# developing — the default (no profile) still uses the embedded H2 file DB.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codearena}
spring.datasource.username=${DB_USERNAME:codearena}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# The H2 web console is meaningless (and should be off) on PostgreSQL.
spring.h2.console.enabled=false
