spring.application.name=codearena-backend

# Loads secrets (e.g. the Groq API key) from a git-ignored file next to pom.xml.
# See application-local.properties.example. "optional:" means the app still
# starts fine if the file is absent (it just falls back to heuristic hints).
spring.config.import=optional:file:./application-local.properties

# ----- Server -----
server.port=8080

# ----- Database (H2 file mode: data persists across restarts, zero setup) -----
# Stored under the user home dir (outside OneDrive to avoid sync locks).
spring.datasource.url=jdbc:h2:file:${user.home}/.codearena/db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info

# ----- CodeArena judge settings -----
codearena.judge.enabled=true
codearena.judge.docker-command=docker
codearena.judge.workdir=${java.io.tmpdir}/codearena-judge
# Engine preference: "docker" runs every submission in a sandbox (all 6 languages);
# "local" prefers fast host runtimes (Python/JS/Java) and uses Docker for C/C++/Go.
codearena.judge.prefer=docker

# ----- Admin -----
# Key required (X-Admin-Key header) to create/edit problems and contests.
codearena.admin.key=codearena-admin-2026
# Seeded admin account: username "admin", this password, role ADMIN.
codearena.admin.password=admin123

# ----- Auth (JWT) -----
# HMAC-SHA256 signing secret. MUST be >= 32 chars. Override in production via
# the JWT_SECRET environment variable. Never commit a real secret.
codearena.jwt.secret=${JWT_SECRET:codearena-dev-secret-change-me-please-32chars-minimum}
# Access token lifetime in hours.
codearena.jwt.ttl-hours=24

# ----- AI (Groq) -----
# provider "groq" enables AI features; anything else uses the offline heuristic hints.
codearena.ai.provider=${AI_PROVIDER:groq}
codearena.ai.model=openai/gpt-oss-120b
codearena.ai.groq.base-url=https://api.groq.com/openai/v1
# API key is read from the GROQ_API_KEY environment variable. Never commit it.
# If empty, the app automatically falls back to heuristic hints.
codearena.ai.groq.api-key=${GROQ_API_KEY:}
